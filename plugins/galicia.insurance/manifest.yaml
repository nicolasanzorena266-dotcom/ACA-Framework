api_version: 1

plugin:
  id: galicia.insurance
  type: domain
  version: 1.0.0
  display_name: Galicia Seguros

requires:
  aca_core: ">=0.4.0"
  aca_plugin_sdk: "^1.0.0"

exports:
  semantic: true
  planner: true
  policy: true
  prompts: true
  knowledge: true
  tools: false
  evals: true
  traces: true
  assets: true

handles:
  - insurance.claims
  - insurance.glass
  - insurance.accident
  - insurance.handoff.prepare

blocked_capabilities:
  - insurance.claim_status.lookup
  - insurance.document.upload
  - insurance.representative.transfer

public_actions:
  - id: show_process
    label: Ver proceso
    capability: insurance.claims
    mode: observation
    requires_real_tool: false
    enabled: true
    disabled_reason: null
  - id: show_diagnostic
    label: Ver diagnóstico
    capability: insurance.claims
    mode: observation
    requires_real_tool: false
    enabled: true
    disabled_reason: null
  - id: prepare_handoff
    label: Preparar derivación
    capability: insurance.handoff.prepare
    mode: action
    requires_real_tool: false
    enabled: true
    disabled_reason: null
  - id: real_claim_status_lookup
    label: Consultar estado real
    capability: insurance.claim_status.lookup
    mode: action
    requires_real_tool: true
    enabled: false
    disabled_reason: "No hay herramienta real conectada para consultar expedientes."
