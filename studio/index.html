<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ACA Studio</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Arial, sans-serif; background: #101114; color: #eeeeee; }
    header { padding: 24px 32px; border-bottom: 1px solid #2b2d34; }
    main { padding: 24px 32px; display: grid; gap: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    section { background: #181a20; border: 1px solid #30323a; border-radius: 14px; padding: 16px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0b0c10; padding: 12px; border-radius: 8px; overflow: auto; max-height: 420px; }
    input, button { font: inherit; padding: 10px 12px; border-radius: 8px; border: 1px solid #3a3d46; }
    input { width: min(720px, 100%); background: #0b0c10; color: #eeeeee; }
    button { cursor: pointer; background: #eeeeee; color: #101114; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .pill { display: inline-block; padding: 4px 8px; border: 1px solid #3a3d46; border-radius: 999px; background: #0b0c10; margin-right: 6px; }
    .muted { color: #b6bac6; }
  </style>
</head>
<body>
  <header>
    <h1>ACA Studio</h1>
    <p id="status">Loading Runtime API…</p>
    <p id="summary" class="muted"></p>
  </header>
  <main>
    <section>
      <h2>Run through Runtime API</h2>
      <div class="row">
        <input id="message" value="Check ticket 12345 status" />
        <button id="run">Run</button>
        <button id="run-domain">Run Demo Domain Flow</button>
        <button id="refresh">Refresh</button>
      </div>
    </section>
    <div class="grid">
      <section><h2>Runtime Binding</h2><pre id="binding">{}</pre></section>
      <section><h2>Domain</h2><pre id="domain">{}</pre></section>
      <section><h2>Metrics</h2><pre id="metrics">{}</pre></section>
    </div>
    <div class="grid">
      <section><h2>Trace / Last Run</h2><pre id="output">{}</pre></section>
      <section><h2>Demo Domain Flow</h2><pre id="domainFlow">{}</pre></section>
      <section><h2>State</h2><pre id="state">{}</pre></section>
      <section><h2>Bootstrap</h2><pre id="bootstrap">{}</pre></section>
    </div>
  </main>
  <script>
    const api = {
      async get(path) {
        const response = await fetch(path);
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      },
      async post(path, body) {
        const response = await fetch(path, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }
    };

    const write = (id, value) => document.getElementById(id).textContent = JSON.stringify(value, null, 2);

    function summarize(binding) {
      const runtime = binding.runtime || {};
      const domain = binding.domain || {};
      const loaded = domain.loaded_packs || [];
      document.getElementById('status').textContent = `Runtime ${runtime.status} · ${runtime.runtime_id}`;
      document.getElementById('summary').innerHTML = [
        `<span class="pill">components: ${runtime.component_count ?? 0}</span>`,
        `<span class="pill">plugins: ${runtime.plugin_count ?? 0}</span>`,
        `<span class="pill">domain packs: ${domain.pack_count ?? 0}</span>`,
        `<span class="pill">traces: ${runtime.trace_count ?? 0}</span>`,
        loaded.length ? `<span class="pill">loaded: ${loaded.join(', ')}</span>` : '<span class="pill">loaded: none</span>'
      ].join('');
    }

    async function refresh() {
      const bootstrap = await api.get('/studio/bootstrap');
      const state = await api.get('/studio/state');
      const binding = await api.get('/studio/binding?root=examples/domain_packs');
      summarize(binding);
      write('bootstrap', bootstrap);
      write('state', state);
      write('binding', binding);
      write('domain', binding.domain || {});
      write('metrics', binding.metrics || {});
    }

    document.getElementById('run').addEventListener('click', async () => {
      const message = document.getElementById('message').value;
      const output = await api.post('/studio/binding/run', { message, conversation_id: 'studio-browser', root: 'examples/domain_packs' });
      write('output', output);
      summarize(output.binding || {});
      write('binding', output.binding || {});
      write('domain', (output.binding || {}).domain || {});
      write('metrics', (output.binding || {}).metrics || {});
    });

    document.getElementById('run-domain').addEventListener('click', async () => {
      const message = document.getElementById('message').value;
      const result = await api.post('/demo/domain-flow', { message, conversation_id: 'studio-domain-flow', root: 'examples/domain_packs' });
      write('domainFlow', result);
      write('output', result.runtime_execution || result);
      summarize(result.binding || {});
      write('binding', result.binding || {});
      write('domain', (result.binding || {}).domain || result.domain || {});
      write('metrics', (result.binding || {}).metrics || {});
    });

    document.getElementById('refresh').addEventListener('click', refresh);
    refresh().catch(error => {
      document.getElementById('status').textContent = `Runtime error: ${error.message}`;
      write('output', { error: error.message });
    });
  </script>
</body>
</html>
